<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Joan's Academic Hub — 为科研之路执灯，守护学术求真之本。文献管理、研究追踪与学术成长的专属空间。" />
    <meta name="theme-color" content="#3d5a80" />
    <title>Joan's Academic Hub | 学术专属空间</title>
    <script>
      (function() {
        const theme = localStorage.getItem('joan-theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
